<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AhMada Business - Louga</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Titre avec dégradé */
        h1 {
            font-size: 2.2em;
            background: linear-gradient(90deg, #007bff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1em;
            color: #888;
            margin-bottom: 30px;
        }

        /* Cadre principal avec effet de vitre (Glassmorphism) */
        .container {
            background: #121212;
            padding: 35px 25px;
            border-radius: 30px;
            max-width: 380px;
            width: 100%;
            border: 1px solid #222;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .location {
            color: #007bff;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Style des boutons avec effet "Glow" */
        .btn {
            padding: 18px 20px;
            border-radius: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-call {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
            margin-bottom: 0;
        }

        /* Animation quand on touche le bouton */
        .btn:active {
            transform: scale(0.96);
            filter: brightness(1.1);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            color: #444;
        }
    </style>
</head>
<body>

    <h1>AhMada Business 🔥</h1>
    <p class="subtitle">Expert en téléphonie & réparation</p>
    
    <div class="container">
        <div class="location">
            <i class="fas fa-location-dot"></i> Louga, Sénégal
        </div>
        
        <a href="tel:+221772794017" class="btn btn-call">
            <i class="fas fa-phone-alt"></i> Appeler le 77 279 40 17
        </a>

        <a href="https://wa.me/221772794017" class="btn btn-whatsapp">
            <i class="fab fa-whatsapp"></i> WhatsApp Business
        </a>
    </div>

    <p class="footer">Service Rapide & Professionnel</p>

</body>
</html>
